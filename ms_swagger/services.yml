  /cross/catalogs/telephone-type:
    post:
      tags:
      - catalogs
      summary: Returns the catalog of phone types.
      description: Returns the registered phone types. If the attribute telephoneTypeId is received empty, the service returns the complete catalog of phone types; if a value is provided in the telephoneTypeId parameter, it returns the phone type object that matches the received value.
