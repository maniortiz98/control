paths:
  /cross/catalogs/nationalities:
    post:
      tags:
      - catalogs
      summary: Returns the complete catalog of nationalities.
      description: If the land attribute is received empty, the service will return the entire catalog of nationalities; if a value is provided in the land parameter, it will return the nationality object that matches the received value.
      operationId: nationalities
      parameters:
      - in: header
        name: Content-Type
        schema:
          type: string
          example: APPLICATION/JSON
        required: true
      - in: header
        name: Authorization
        schema:
          type: string
          example: BEARER EYJHBGCIOIJIUZI1NIISINR5CCI6IKPXVCJ9.EYJZDWIIOIIXMJM0NTY3ODKWIIWIBMFTZSI6IKPVAG4GRG9LIIWIAWF0IJOXNTE2MJM5MDIYFQ.SFLKXWRJSMEKKF2QT4FWPMEJF36POK6YJV_ADQSSW5C
        required: true
      requestBody:
        description: land parameter to filter nationalities by land
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/nationalitiesRequest'
            example:
              land:
              - ''
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/nationalitiesResponse'
              example:
                status: 200
                messages:
                - SUCCESS
                payload:
                  nationalities:
                  - nationalityId: MX
                    nationality: MEXICANA
                  - nationalityId: US
                    nationality: AMERICANA
                  - nationalityId: CA
                    nationality: CANADIENSE
                  - nationalityId: BR
                    nationality: BRASILEÑA
                  - nationalityId: AR
                    nationality: ARGENTINA
                  - nationalityId: CO
                    nationality: COLOMBIANA
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '401':
          description: JWT is expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
              example:
                status: 401
                appCode: CROSS-SUPPORT-E-401
                messages:
                - JWT IS EXPIRED
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
              example:
                status: 403
                appCode: CROSS-SUPPORT-E-403
                messages:
                - FORBIDDEN
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
              example:
                status: 404
                appCode: CROSS-SUPPORT-E-404
                messages:
                - RESOURCE NOT FOUND
        '412':
          description: Precondition failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
              example:
                status: 412
                appCode: CROSS-SUPPORT-E-412
                messages:
                - PRECONDITION FAILED
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
              example:
                status: 500
                appCode: SPINE-MS_CROSS_SUPPORT-CATALOGS-500
                messages:
                - "ERROR EN EL TRATAMIENTO DE SERVICIO WEB; MÁS DETALLES EN LOG DE ERROR DE SERVICIO WEB EN LA PÁGINA DE PROVEEDOR (CRONOMARCADOR UTC 20220816151711; ID DE TRANSACCIÓN B742632CC2C200A0E0062ED2ACC62E94"
  /cross/catalogs/contracts/search:
    post:
