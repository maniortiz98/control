      - in: header
        name: Content-Type
        schema:
          type: string
          example: APPLICATION/JSON
        required: true
      - in: header
        name: Authorization
        schema:
          type: string
          example: BEARER EYJHBGCIOIJIUZI1NIISINR5CCI6IKPXVCJ9.EYJZDWIIOIIXMJM0NTY3ODKWIIWIBMFTZSI6IKPVAG4GRG9LIIWIAWF0IJOXNTE2MJM5MDIYFQ.SFLKXWRJSMEKKF2QT4FWPMEJF36POK6YJV_ADQSSW5C
        required: true
      requestBody:
        description: Phone type identifier
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/phoneTypeRequuest'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/telephoneTypeResponse'
              example:
                status: 200
                messages:
                  - "Success"
                payload:
                  errorMsg:
                    items:
                      - messageType: "N"
                        category: "INFO"
                        code: "ACSAP0000011"
                        message: "Éxito al realizar la consulta."
                        shortDescription: "Consulta de catálogo exitsa"
                  telephoneType:
