openapi: 3.0.3
info:
  title: MS - SPINE MOCK
  description: This a sample MS SPINE Server based on the OpenAPI 3.0 specification.
    You can explore the paths for Customers API and check the request and response
    of all services.
  termsOfService: https://swagger.io/terms/
  contact:
    email: cramosmon@minsait.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: '1.0'
externalDocs:
  description: Find out more about Swagger
  url: https://swagger.io
servers:
- url: https://develop-api.actinver.com.mx
tags:
- name: catalogs
  description: API for Catalogs SPINE
- name: person
  description: API for Persons SPINE
- name: customers
  description: API for Customers SPINE
paths:
  /person/onboarding/registrer:
    post:
      tags:
      - person
      summary: Registro de Onboarding de Cliente
      description: Registra un nuevo cliente en el sistema a través del proceso de onboarding.
      operationId: registerOnboardingClient
      parameters:
      - $ref: '#/components/parameters/ContentTypeHeader'
      - $ref: '#/components/parameters/SpineHeader'
      security:
      - BearerAuth: []
      requestBody:
        description: Datos del cliente para el registro de onboarding
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/onboardingRegisterRequest'
      responses:
        '200':
          description: Respuesta exitosa para el registro de onboarding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/onboardingRegisterResponse'
              examples:
                OnboardingRegisterSuccess:
                  summary: Registro de onboarding exitoso
                  value:
                    customerId: "CUST-987654"
                    contracts:
                      - contractId: "1"
                        contractNumber: "CONT-123456"
                        contractType: "Banco"
                    members:
                      - memberType: "Cotitular"
                        clientId: "MEB-654321"
                        firstName: "Ana"
                        lastName: "López"
                OnboardingRegisterBlackListsSuccess:
                  summary: Verificación en listas negras titular tiene HIT
                  value:
                    isBlackListed: true
                    step: 1
                    blackLists:
                      - companyName: "Juan Carlos Pérez Gómez"
                        name: "Juan Carlos"
                        lastName: "Pérez"
                        secondLastName: "Gómez"
                        tin: "PEGC800101XXX"
                        type: "OFAC"
                        matchPercentage: 95.5
                        status: "1"
                OnboardingRegisterMembersInBlackLists:
                  summary: Miembros del contrato en listas negras
                  value:
                    - isBlackListed: true
                      step: 1
                      memberData:
                        memberType: "Cotitular"
                        clientId: "MEB-654321"
                        firstName: "Ana"
                        lastName: "López"
                      blackLists:
                        - companyName: "Juan Carlos Pérez Gómez"
                          name: "Juan Carlos"
                          lastName: "Pérez"
                          secondLastName: "Gómez"
                          tin: "PEGC800101XXX"
                          type: "OFAC"
                          matchPercentage: 95.5
                          status: "1"
                    - isBlackListed: true
                      step: 1
                      memberData:
                        memberType: "Apoderado"
                        clientId: "MEB-654322"
                        firstName: "Luis"
                        lastName: "Martínez"
                      blackLists:
                        - companyName: "Luis Martínez Rodríguez"
                          name: "Luis"
                          lastName: "Martínez"
                          secondLastName: "Rodríguez"
                          tin: "MARL800202XXX"
                          type: "OFAC"
                          matchPercentage: 88.0
                          status: "1"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /cross/catalogs/started-working:
    post:
      tags:
      - catalogs
      summary: Obtener Catálogo de Datos de Inicio de Trabajo
      description: Obtiene el catálogo de datos relacionados con el inicio de trabajo.
      operationId: getStartedWorkingData
      parameters:
      - $ref: '#/components/parameters/ContentTypeHeader'
      - $ref: '#/components/parameters/SpineHeader'
      security:
      - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/startedWorkingDataResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /cross/catalogs/funds-origin-category:
    post:
      tags:
      - catalogs
      summary: Obtener Catálogo de Categorías de Origen de Fondos
      description: Obtiene el catálogo de categorías de origen de fondos.
      operationId: getFundsOriginCategoryData
      parameters:
      - $ref: '#/components/parameters/ContentTypeHeader'
      - $ref: '#/components/parameters/SpineHeader'
      security:
      - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/fundsOriginCategoryDataResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /customers/workflow/assignment-detail:
    post:
      tags:
      - customers
      summary: Obtener Detalle de Asignación de Flujo de Trabajo
      description: Obtiene el detalle de asignación del flujo de trabajo para una cuenta y cliente específicos.
      operationId: getWorkFlowAssignmentDetail
      parameters:
      - $ref: '#/components/parameters/ContentTypeHeader'
      - $ref: '#/components/parameters/SpineHeader'
      security:
      - BearerAuth: []
      requestBody:
        description: Datos para obtener el detalle de asignación del flujo de trabajo
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkFlowAssignmentDetailRequest'
      responses:
        '200':
          $ref: '#/components/responses/WorkFlowAssignmentDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /customers/workflow/take:
    post:
      tags:
      - customers
      summary: Tomar Flujo de Trabajo
      description: Permite a un usuario tomar un flujo de trabajo específico.
      operationId: takeWorkflow
      parameters:
      - $ref: '#/components/parameters/ContentTypeHeader'
      - $ref: '#/components/parameters/SpineHeader'
      security:
      - BearerAuth: []
      requestBody:
        description: Datos para tomar el flujo de trabajo
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TakeWorkflow'
      responses:
        '200':
          $ref: '#/components/responses/TakeWorkflowResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /customers/workflow/update-status:
    post:
      tags:
      - customers
      summary: Actualizar Estatus del Flujo de Trabajo
      description: Permite actualizar el estatus de un flujo de trabajo específico.
      operationId: updateWorkflowStatus
      parameters:
      - $ref: '#/components/parameters/ContentTypeHeader'
      - $ref: '#/components/parameters/SpineHeader'
      security:
      - BearerAuth: []
      requestBody:
        description: Datos para actualizar el estatus del flujo de trabajo
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkflowStatus'
      responses:
        '200':
          $ref: '#/components/responses/UpdateWorkflowStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication
  parameters:
    ContentTypeHeader:
      in: header
      name: Content-Type
      required: true
      schema:
        type: string
        enum: [application/json, APPLICATION/JSON]
        default: application/json
      description: Content type of the request
    SpineHeader:
      in: header
      name: x-actinver-spine
      required: true
      schema:
        type: boolean
        default: true
      description: Actinver SPINE flag
  responses:
    Success:
      description: Operación exitosa
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: "200"
              messages:
                type: array
                items:
                  type: string
                example: ["SUCCESS"]
              payload:
                type: object
    BadRequest:
      description: Solicitud incorrecta - Parámetros inválidos o faltantes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidParameters:
              summary: Parámetros inválidos
              value:
                status: 400
                appCode: CROSS-SUPPORT-E-400
                messages:
                  - "Invalid search parameters"
            missingFields:
              summary: Campos requeridos faltantes
              value:
                status: 400
                appCode: CROSS-SUPPORT-E-400
                messages:
                  - "Missing required fields"
    Unauthorized:
      description: No autorizado - Token JWT expirado o inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            jwtExpired:
              summary: JWT expirado
              value:
                status: 401
                appCode: CROSS-SUPPORT-E-401
                messages:
                  - "JWT IS EXPIRED"
            jwtInvalid:
              summary: JWT inválido
              value:
                status: 401
                appCode: CROSS-SUPPORT-E-401
                messages:
                  - "JWT IS INVALID"
    Forbidden:
      description: Prohibido - El usuario no tiene permisos para acceder al recurso
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              summary: Acceso prohibido
              value:
                status: 403
                appCode: CROSS-SUPPORT-E-403
                messages:
                  - "FORBIDDEN"
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              summary: Recurso no encontrado
              value:
                status: 404
                appCode: CROSS-SUPPORT-E-404
                messages:
                  - "RESOURCE NOT FOUND"
    PreconditionFailed:
      description: Precondición fallida - El servidor no cumple con las precondiciones
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              summary: Precondición fallida
              value:
                status: 412
                appCode: CROSS-SUPPORT-E-412
                messages:
                  - "PRECONDITION FAILED"
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            webServiceError:
              summary: Error en servicio web
              value:
                status: 500
                appCode: SPINE-MS_CROSS_SUPPORT-CATALOGS-500
                messages:
                  - "ERROR EN EL TRATAMIENTO DE SERVICIO WEB; MÁS DETALLES EN LOG DE ERROR DE SERVICIO WEB EN LA PÁGINA DE PROVEEDOR (CRONOMARCADOR UTC 20220816151711; ID DE TRANSACCIÓN B742632CC2C200A0E0062ED2ACC62E94)"
            genericError:
              summary: Error genérico
              value:
                status: 500
                appCode: SPINE-MS_CROSS_SUPPORT-500
                messages:
                  - "INTERNAL SERVER ERROR"
    OnboardingRegisterSuccess:
      description: Respuesta exitosa para el registro de onboarding
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/onboardingRegisterResponse'
    OnboardingRegisterBlackListsSuccess:
      description: Respuesta exitosa para la verificación en listas negras
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/onboardingRegisterBlackListsResponse'
    OnboardingRegisterMembersInBlackLists:
      description: Respuesta exitosa cuando se encuentran miembros del contrato en listas negras
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/OnboardingRegisterMemberInBlackLists'
    startedWorkingDataResponse:
      description: Respuesta exitosa para la obtención de datos de inicio de trabajo
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/startedWorkingData'
            example:
              - cve: "001"
                description: "MENOS DE UN AÑO"
              - cve: "002"
                description: "Entre 1 Y 5 AÑOS"
              - cve: "003"
                description: "ENTRE 5 Y 10 AÑOS"
              - cve: "004"
                description: "MÁS DE 10 AÑOS"
    propertyStatusDataResponse:
      description: Respuesta exitosa para la obtención de estatus de propiedad
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/propertyStatusData'
            example:
              - cve: "01"
                description: "PROPIO"
              - cve: "02"
                description: "RENTADO"
    fundsOriginCategoryDataResponse:
      description: Respuesta exitosa para la obtención de categorías de origen de fondos
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/FundsOriginCategoryData'
            example:
              - cve: "001"
                description: "ACORDE A SU ACTIVIDAD Y AL NIVEL SOCIOECONOMICO"
              - cve: "002"
                description: "NO COINCIDE CON SU NIVEL SOCIOECONOMICO"
              - cve: "003"
                description: "EL CLIENTE ACTUA POR CUENTA DE UN TERCERO O TIENE PROVEEDOR DE RECURSOS"
    WorkFlowAssignmentDetailResponse:
      description: Respuesta exitosa para la obtención del detalle de asignación del flujo de trabajo
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/WorkFlowAssignmentDetail'
    TakeWorkflowResponse:
      description: Respuesta exitosa para la toma de un flujo de trabajo
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TakeWorkflowData'
    UpdateWorkflowStatusResponse:
      description: Respuesta exitosa para la actualización del estatus del flujo de trabajo
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateWorkflowStatusData'
  schemas:
    # Base Error Response
    ErrorResponse:
      type: object
      required:
        - status
        - appCode
        - messages
      properties:
        status:
          type: integer
          format: int32
          description: Código de estado HTTP
          example: 400
        appCode:
          type: string
          description: Código de error de la aplicación
          example: CROSS-SUPPORT-E-400
        messages:
          type: array
          description: Lista de mensajes de error
          items:
            type: string
          example:
            - "Invalid search parameters"
        details:
          type: object
          description: Detalles adicionales del error (opcional)
          additionalProperties: true
    # Standard Error Message
    StandardErrorMessage:
      type: object
      properties:
        messageType:
          type: string
          enum: [N, W, E, I]
          description: N=Normal, W=Warning, E=Error, I=Info
          example: "E"
        category:
          type: string
          enum: [INFO, WARNING, ERROR]
          example: "ERROR"
        code:
          type: string
          example: "ACSAP0000011"
        message:
          type: string
          example: "ÉXITO AL REALIZAR LA CONSULTA."
        shortDescription:
          type: string
          example: "CONSULTA DE CATÁLOGO EXITOSA"
    StandardPayload:
      type: object
      properties:
        status:
          type: integer
          enum: [0, 1]
          description: 0=Error, 1=Success
          example: 1
        errorMsg:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/StandardErrorMessage'
    onboardingRegisterRequest:
      type: object
      properties:
        applicationId:
          type: string
          description: Número de solicitud de Onboarding
          example: "123456"
      required:
        - applicationId
    onboardingRegisterResponse:
      type: object
      properties:
        customerId:
          type: string
          description: Identificador único del cliente registrado
          example: "CUST-987654"
        contracts:
          type: array
          description: Lista de contratos asociados al cliente
          items:
            type: object
            properties:
              contractId:
                type: string
                description: Identificador único del contrato
                example: "1"
              contractNumber:
                type: string
                description: Número del contrato
                example: "CONT-123456"
              contractType:
                type: string
                description: Tipo de contrato
                example: "Banco"
        members:
          type: array
          description: Lista de miembros asociados al contrato
          items:
            $ref: '#/components/schemas/member'
    member:
      type: object
      properties:
        memberType:
          type: string
          description: Tipo de miembro
          example: "Cotitular"
        clientId:
          type: string
          description: Identificador único del miembro
          example: "MEB-654321"
        firstName:
          type: string
          description: Nombre del miembro
          example: "Ana"
        lastName:
          type: string
          description: Apellido del miembro
          example: "López"
    onboardingRegisterBlackListsResponse:
      type: object
      properties:
        isBlackListed:
          type: boolean
          description: Indica si el cliente está en listas negras
          example: true
        step:
          type: integer
          description: Paso del proceso de verificación
          example: 1
        blackLists:
          type: array
          description: Listas negras en las que el cliente está incluido
          items:
            $ref: '#/components/schemas/blackListData'
    blackListData:
      type: object
      properties:
        companyName:
          type: string
          description: Nombre completo de la persona o entidad en la lista negra
          example: "Juan Carlos Pérez Gómez"
        name:
          type: string
          description: Nombre de la persona o entidad en la lista negra
          example: "Juan Carlos"
        lastName:
          type: string
          description: Apellido de la persona o entidad en la lista negra
          example: "Pérez"
        secondLastName:
          type: string
          description: Segundo apellido de la persona o entidad en la lista negra
          example: "Gómez"
        tin:
          type: string
          description: Número de Identificación del Contribuyente (TIN) asociado a la persona o entidad en la lista negra. En caso de personas nacionales, se refiere al RFC.
          example: "PEGC800101XXX"
        type:
          type: string
          description: Tipo de lista negra
          example: "OFAC"
        matchPercentage:
          type: number
          format: float
          description: Porcentaje de coincidencia con la lista negra
          example: 95.5
        status:
          type: string
          description: Estado del registro en la lista negra
          example: "1"
    OnboardingRegisterMemberInBlackLists:
      type: object
      properties:
        isBlackListed:
          type: boolean
          description: Indica si el miembro está en listas negras
          example: true
        step:
          type: integer
          description: Paso del proceso de verificación
          example: 1
        memberData:
          type: object
          description: Datos del miembro del contrato que está en listas negras
          $ref: '#/components/schemas/member'
        blackLists:
          type: array
          description: Listas negras en las que el miembro está incluido
          items:
          $ref: '#/components/schemas/blackListData'
    startedWorkingData:
      type: object
      properties:
        cve:
          type: string
          description: Clave del empleo
          example: "001"
        description:
          type: string
          description: Descripción
          example: "MENOS DE UN AÑO"
    propertyStatusData:
      type: object
      properties:
        cve:
          type: string
          description: Clave del estatus de la propiedad
          example: "01"
        description:
          type: string
          description: Descripción del estatus de la propiedad
          example: "PROPIO"
    FundsOriginCategoryData:
      type: object
      properties:
        cve:
          type: string
          description: Clave de la categoría de monto de inversión
          example: "001"
        description:
          type: string
          description: Descripción de la categoría de monto de inversión
          example: "ACORDE A SU ACTIVIDAD Y AL NIVEL SOCIOECONOMICO"
    WorkFlowAssignmentDetailRequest:
      type: object
      properties:
        domainUser:
          type: string
          description: Usuario de dominio ACTINVER
          example: "ACTINVER"
      required:
        - domainUser
    WorkFlowAssignmentDetail:
      type: object
      properties:
        id:
          type: integer
          description: Identificador del detalle de asignación del flujo de trabajo
          example: 1
        number:
          type: integer
          description: Número del detalle de asignación del flujo de trabajo
          example: 1001
        accountId:
          type: integer
          description: Identificador de la cuenta
          example: 1
        clientId:
          type: integer
          description: Identificador del cliente
          example: 1
        personType:
          type: integer
          description: Tipo de persona
          example: 1
        description:
          type: string
          description: Descripción del detalle de asignación del flujo de trabajo
          example: "Detalle de Asignación del Flujo de Trabajo"
        operativeFlow:
          type: string
          description: Flujo operativo asociado
          example: "Flujo Operativo 1"
        observations:
          type: string
          description: Observaciones adicionales
          example: "Ninguna observación"
        rejectedReason:
          type: string
          description: Razón de rechazo, si aplica
          example: "Motivo de rechazo"
        list:
          type: string
          description: Lista asociada
          example: "Lista 1"
        requestDate:
          type: string
          format: date-time
          description: Fecha de la solicitud
          example: "2024-01-01T12:00:00Z"
        responseDate:
          type: string
          format: date-time
          description: Fecha de la respuesta
          example: "2024-01-02T12:00:00Z"
        workFlow:
          $ref: '#/components/schemas/WorkFlowData'
        workflowStatus:
          $ref: '#/components/schemas/WorkFlowStatusData'
        causeWorkflowChange:
          $ref: '#/components/schemas/CauseWorkflowChange'
        createdBy:
          $ref: '#/components/schemas/workflowRequester'
        approvedBy:
          $ref: '#/components/schemas/workflowApprover'
    WorkFlowData:
      type: object
      properties:
        id:
          type: integer
          description: Identificador del flujo de trabajo
          example: 1
        name:
          type: string
          description: Nombre del flujo de trabajo
          example: "Aprobación Contrato PF"
    WorkFlowStatusData:
      type: object
      properties:
        id:
          type: integer
          description: Clave del estatus del flujo de trabajo
          example: 1
        description:
          type: string
          description: Descripción del estatus del flujo de trabajo
          example: "Listo/Inicializado"
    CauseWorkflowChange:
      type: object
      properties:
        id:
          type: integer
          description: Identificador de la causa del cambio de estatus
          example: 1
        cve:
          type: string
          description: Clave de la causa del cambio de estatus
          example: "01"
        description:
          type: string
          description: Descripción de la causa del cambio de estatus
