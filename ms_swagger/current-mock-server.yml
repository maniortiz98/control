      summary: Returns the contracts sorted based on the limit sent, which is taken as the TOP of the contracts.
      description: Returns the contracts sorted based on the limit sent, which is taken as the TOP of the contracts.
      operationId: contractsTop
      parameters:
      - in: header
        name: Content-Type
        schema:
          type: string
          example: APPLICATION/JSON
        required: true
      - in: header
