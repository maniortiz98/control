components:
  schemas:
    errorResponse:
      type: object
      properties:
        status:
          type: integer
          format: int32
          example: 400
        appCode:
          type: string
          example: MAINTENANCE-SUPPORT-E-400
        messages:
          type: array
          items:
            type: string
          example:
          - Invalid search parameters
    checkpointRequest:
      type: object
      required:
      - sectionId
      properties:
        onboardingId:
          type: integer
          format: int64
          example: 1234567890
          description: Unique identifier for the onboarding process
        sectionId:
          type: array
          items:
            type: string
            enum:
            - identification-contact
            - initial-data
            - privacy-notice
            - spouse-data
            - address
            - beneficiaries
            - ppe-information
            - fiscal-self-declaration
            - signature
            - general-information
            - authorized-person
            - personal-interview
            - bank-account
            - real-owner
            - resource-provider
            - transactional-investment-profile
            - exchange-operation
            - credit-information
            - additional-information
            - actiweb
            - questionnairePld
            - datos-iniciales
            - identificacion-contacto
            - informacion-ppe
            - datos-generales
            - domicilio
            - firma
            - autocertificacion-fiscales
            - entrevista-personal
          description: Array of section IDs for the checkpoint
        clientId:
          type: string
          description: Client identifier
        accountId:
          type: string
          description: Account identifier
        bankingAreaId:
          type: string
          description: Banking area identifier
      description: Request object for checkpoint data
    checkpointResponse:
      type: object
      properties:
        clientId:
          type: string
          description: Client identifier
        accountId:
          type: string
          description: Account identifier
        checkpoints:
          type: array
          description: Array of sections with their data
          items:
            type: object
            required:
            - sectionId
            - data
            properties:
              sectionId:
                type: string
                enum:
                - identification-contact
                - initial-data
                - privacy-notice
                - spouse-data
                - address
                - beneficiaries
                - ppe-information
                - fiscal-self-declaration
                - signature
                - general-information
                - authorized-person
                - personal-interview
                - bank-account
                - real-owner
                - resource-provider
                - transactional-investment-profile
                - exchange-operation
                - credit-information
                - additional-information
                - actiweb
                - questionnairePld
                description: Identifier of the section
              data:
                type: object
                description: Section-specific data
                additionalProperties: true
      description: Response object containing combined sections with their identifiers
 