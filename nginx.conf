server {
  listen 80;
  server_name localhost;
 
  root /usr/share/nginx/html;
  index index.html;

  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    access_log off;
  }

  location = /assets/build-info.json {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    access_log off;
  }
 
  location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
  expires 1y;
    add_header Cache-Control "public, max-age=315436000, immutable" always;
    access_log off;
  }

  location / {
    try_files $uri /index.html;
  }
}
