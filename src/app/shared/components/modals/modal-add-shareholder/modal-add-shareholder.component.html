<!-- modal-add-shareholder.component.html -->
<h2 mat-dialog-title>Agregar Accionista</h2>

<form [formGroup]="form" class="form-grid">
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-card-title class="mat-card-title">Tipo de Persona</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-radio-group formControlName="personType">
        <mat-radio-button value="PF">Persona Física</mat-radio-button>
        <mat-radio-button value="PM" class="ml-16"
          >Persona Moral</mat-radio-button
        >
      </mat-radio-group>
    </mat-card-content>
  </mat-card>

  <div class="row">
    <mat-form-field appearance="outline" class="w-200">
      <mat-label>% participación accionaria</mat-label>
      <input matInput type="number" formControlName="percentage" />
      <mat-hint>Restante: {{ data.remaining }}%</mat-hint>
      <mat-error *ngIf="form.controls.percentage.hasError('required')">
        Requerido
      </mat-error>
      <mat-error *ngIf="form.controls.percentage.hasError('min')">
        Debe ser mayor a 0
      </mat-error>
      <mat-error *ngIf="form.controls.percentage.hasError('max')">
        No puede exceder {{ data.remaining }}%
      </mat-error>
    </mat-form-field>
  </div>
</form>

<button mat-button (click)="cancel()">Cancelar</button>
<button
  mat-flat-button
  color="primary"
  (click)="save()"
  [disabled]="form.invalid"
>
  Guardar
</button>
