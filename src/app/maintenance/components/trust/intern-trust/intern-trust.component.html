<div class="mt-3">
  <app-section-trust [initialInfo]="initSection"></app-section-trust>

  <mat-label class="checkbox-titiles radio-marging">Favor de indicar los teléfonos de fideicomitente que quedarán
    asociados al contrato:</mat-label>

  <div class="list-section mt-3">
    <app-phone-section [disabled]="false" [listStorage]="phoneSaved" [personType]="'PF'"
      [disableOTC]="true"></app-phone-section>
  </div>
  <div class="list-section mt-3">
    <app-mail-section [disabled]="false" [mailSaved]="mailSaved" [disableOTC]="true"></app-mail-section>
  </div>
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="form-row mt-3">
      <div class="input-field field-full">
        <mat-label>Recomendaciones de Inversión </mat-label>
        <input matInput type="text" formControlName="recomendations" appUppercase maxlength="100" />
      </div>
    </div>
  </form>
  <div class="mt-3">
    <div class="text-end">
      <button matButton class="bt-add-other" (click)="create()" type="button">
        Crear solicitud Fideicomiso
      </button>

      <button matButton class="bt-submit" (click)="save()" type="button">
        Guardar solicitud Fideicomiso
      </button>
    </div>
  </div>

  <span class="text-danger txt-notice">*Campos obligatorios</span>


</div>
