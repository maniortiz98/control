<div class="pop-up">
  <button class="close-button" (click)="close()">×</button>
  <mat-label class="table-titles">Agregar Municipio</mat-label>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-3 form-custom">

    <div class="form-row full-size">
      <div class="input-field">
        <mat-label>Estado</mat-label>
        <input mat-input type="text" [value]="estadoNombre" readonly />
      </div>
    </div>
    <div class="form-row full-size">
      <div class="input-field">
        <mat-label>Clave <span class="text-danger">*</span></mat-label>
        <input mat-input id="idMunicipioCve" type="text" formControlName="idMunicipioCve" appUppercase appAlphanumericOnly maxlength="10" />
        <span class="fhint">Se sugiere una clave de 4 dígitos; puedes modificarla.</span>
        <div class="text-danger small" *ngIf="form.get('idMunicipioCve')?.invalid && form.get('idMunicipioCve')?.touched">
          <span *ngIf="form.get('idMunicipioCve')?.errors?.['pattern']">No se permiten caracteres especiales.</span>
        </div>
      </div>
    </div>
    <div class="form-row full-size">
      <div class="input-field">
        <mat-label>Municipio <span class="text-danger">*</span></mat-label>
        <input mat-input id="municipio" type="text" formControlName="municipio" appUppercase maxlength="255" />
        <div class="text-danger small" *ngIf="form.get('municipio')?.invalid && form.get('municipio')?.touched">
          <span *ngIf="form.get('municipio')?.errors?.['pattern']">No se permiten caracteres especiales.</span>
        </div>
      </div>
    </div>
    <div class="form-row full-size">
      <div class="input-field">
        <mat-label>Zona Geográfica</mat-label>
        <select class="form-control" id="idZonaGeografica" formControlName="idZonaGeografica">
          <option value="">Selecciona una opción</option>
          <option value="A">A</option>
          <option value="B">B</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="input-field">
        <mat-label class="mat-label">Estatus</mat-label>
        <mat-radio-group formControlName="activo">
          <mat-radio-button [value]="true">Activo</mat-radio-button>
          <mat-radio-button [value]="false">Inactivo</mat-radio-button>
        </mat-radio-group>
      </div>
    </div>

    <div class="text-end mt-4">
      <button type="button" class="bt-add-other me-3" (click)="close()">Cancelar</button>
      <button type="submit" class="bt-submit">Guardar</button>
    </div>
  </form>
</div>
