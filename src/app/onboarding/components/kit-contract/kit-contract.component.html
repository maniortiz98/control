<div class="custom-page">

  <div class="row justify-content-center" style="margin-bottom: 40px;">
    <div class="col-8">
      <div class="d-flex justify-content-between align-items-center">
        <div style="max-width: 60%;">
          <div class="title">KIT de Contratación</div>
          <div class="subtitle">Dirígete a OpenText para visualizar e imprimir los documentos del contrato</div>
        </div>
        <div class="prospect-box">
          <div class="subtitle">Número de cliente</div>
          <div class="d-flex align-items-center justify-content-end">
            <span class="prospect-number">{{ infoToCopy }}</span>
            <button mat-icon-button (click)="copyProspectNumber()" aria-label="Copiar número">
              <mat-icon class="copy-icon">content_copy</mat-icon>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-8 text-center">
      <mat-list class="kit-list">
        @for (item of documentsList(); track $index) {
        <mat-divider></mat-divider>
        <mat-list-item>{{item.kitDocumentName}}</mat-list-item>
        }
      </mat-list>
    </div>
  </div>

  <div class="row custom-padding">
    <div class="text-end">
      <button matButton class="bt-submit" type="button" (click)="openText()">
        Abrir OpenText
      </button>
    </div>
  </div>

</div>
