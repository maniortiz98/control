<div class="custom-page">
  <div class="bg-white custom-padding">
    <form [formGroup]="form">
      <div class="form-container">

        @for (privacyCheck of privacyChecksArr; track $index) {
        <div class="check-option">
          <mat-checkbox [id]="privacyCheck.controlName" 
                        [formControlName]="privacyCheck.controlName"
                        class="custom-checkbox" />
          <mat-label>{{privacyCheck.text}}</mat-label>
        </div>
        }

      </div>

      @if(isMaintenance()){
        @if(isEditable() && hasRolePermissionToEdit()){
          <div class="d-flex justify-content-end py-3">
            <button class="bt-submit d-flex align-items-center justify-content-center gap-1" 
                    (click)="edit()"
                    [disabled]="editMode()">
              <mat-icon>edit</mat-icon>
              <span class="pt-1">Editar</span>
            </button>
          </div>
          <div class="d-flex justify-content-end">
            <button class="bt-submit bt-exit" (click)="cancel()" [disabled]="!editMode() || form.pristine">Cancelar</button>
            <button class="bt-submit" (click)="save()" [disabled]="!editMode() || form.pristine || !form.valid">Guardar</button>
          </div>
        }
      }
      @else{
      <div class="d-flex justify-content-end pt-3">
        <button class="bt-submit" (click)="save()">Guardar</button>
      </div>
      }
    </form>
  </div>
</div>
