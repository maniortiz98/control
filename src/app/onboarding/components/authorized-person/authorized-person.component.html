<div class="custom-page">
  <div class="bg-white custom-padding">

    <div class="row">
      <div class="col-6">
        <h5 class="table-titles">Personas Autorizadas Registradas</h5>
        @if ( 0 === authorizedPersonData().table.length ) {
          <div class="no-item-label">No hay registros</div>
        }

      </div>
      <div class="col-6 text-end">
        <button [disabled]="disButtons.register" class="input btn-secondary" (click)="showModal()">+ Agregar Persona Autorizada</button>
      </div>
    </div>

    <div class="row custom-padding">

      <div class="col-12" style="margin-top: 2%;">

        <app-table-results
          [data]="authorizedPersonData().table"
          [columns]="tableCols"
          [config]=" tableConfig"
          (eventRow)="eventRow($event)">
        </app-table-results>

      </div>

      <div class="flex-fill"></div>
    </div>

    <div class="flex-fill"></div>

    @if ( isMaintenance() ) {
      <div class="row custom-padding" st>
        <div class="text-end">
          <button [disabled]="disButtons.edit" matButton class="bt-submit" type="button" (click)="editMaintenance()">
            Editar
          </button>
        </div>
      </div>
    }

    <div class="row custom-padding">
      <div class="text-end">
        @if ( isMaintenance() ) {
          <button [disabled]="disButtons.cancel" matButton class="bt-submit" type="button" (click)="cancelMaintenance()">
            Cancelar
          </button>
        }
        <button [disabled]="disButtons.save" class="bt-submit" type="button" (click)="submit()">
          Guardar
        </button>
      </div>
      <p class="mt-2 text-muted">
        <span class="text-danger">* Campos obligatorios</span>
      </p>
    </div>

  </div>

</div>
